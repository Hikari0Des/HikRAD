# HikRAD Docker Compose stack — contract C5 (Phase 1, Agent A).
#
# Service names are a frozen contract: postgres:5432, redis:6379,
# hikrad-api:8080, freeradius (1812/1813/3799 udp host-published),
# caddy (80/443 host-published).
#
# Interpolation variables come from the env file (deploy/.env in dev,
# /opt/hikrad/.env in production — see scripts/gen-env.sh). The stack must
# boot with only that file present; nothing here needs internet after the
# images are pulled (NFR-7).
#
# Memory limits are sized so the whole stack fits the NFR-3 tier
# (4 vCPU / 8 GB / 200 GB) with headroom for the Phase-2 services below.

name: hikrad

services:
  postgres:
    # TODO(release): pin an exact timescaledb tag before shipping (FR-51.4
    # updates pull pinned tags).
    image: timescale/timescaledb:latest-pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hikrad}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?generate with scripts/gen-env.sh}
      POSTGRES_DB: ${POSTGRES_DB:-hikrad}
    volumes:
      - ${HIKRAD_DATA_DIR:-./data}/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 2048M

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # AOF always: measured in Phase 5's chaos suite (docs/evidence/
    # redis-durability-decision.md) to be the difference between 0/3 and
    # occasional 1-record loss on kill-redis vs. everysec's fsync-per-second
    # window — the M2 "never lose an Accounting-Request" claim requires it.
    command: ["redis-server", "--appendonly", "yes", "--appendfsync", "always"]
    volumes:
      - ${HIKRAD_DATA_DIR:-./data}/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 768M

  hikrad-api:
    build:
      context: ..
      dockerfile: deploy/docker/api.Dockerfile
      args:
        # Surfaced at GET /api/v1/system/version; the hikrad CLI exports this
        # from the repo-root VERSION file before any compose build.
        HIKRAD_VERSION: ${HIKRAD_VERSION:-dev}
    restart: unless-stopped
    environment:
      HIKRAD_DB_URL: ${HIKRAD_DB_URL:?generate with scripts/gen-env.sh}
      HIKRAD_REDIS_URL: ${HIKRAD_REDIS_URL:-redis://redis:6379/0}
      HIKRAD_ENCRYPTION_KEY: ${HIKRAD_ENCRYPTION_KEY:?generate with scripts/gen-env.sh}
      HIKRAD_JWT_SECRET: ${HIKRAD_JWT_SECRET:?generate with scripts/gen-env.sh}
      HIKRAD_ENV: ${HIKRAD_ENV:-prod}
      # FR-13.2/AC-13a: hikrad-api regenerates FreeRADIUS's per-NAS client
      # list on every NAS create/update/delete and asks it to reload over the
      # control socket below — otherwise a real NAS (anything other than the
      # harness/CI's wildcard docker_bridge_dev client) silently times out
      # forever, since FreeRADIUS's transport layer never learns its secret
      # (found live in the Phase-5 M4 gate rehearsal against a real MikroTik).
      HIKRAD_RADIUS_CLIENTS_PATH: /etc/hikrad/clients-generated.conf
      HIKRAD_RADIUS_CONTROL_SOCKET: /var/run/freeradius/freeradius.sock
      # One-click updater relay (FR-86/87, v2 phase 7): hikrad-api talks to
      # hikrad-updaterd — a HOST process, never a container in this stack —
      # over the unix socket bind-mounted below. The path here is the
      # CONTAINER side of that mount; the daemon itself uses a different
      # (host) path for the same socket file, set in its own systemd unit
      # (scripts/install.sh) — same env var name, deliberately different
      # values on each side of the mount.
      # Deliberately soft (not :?required): an install from before v2 phase 7
      # upgrades via `hikrad update`, which never re-runs install.sh, so its
      # .env may not have this key yet. hikrad-api must still boot — the
      # one-click-update relay routes report "not configured" rather than
      # taking the whole panel down over a convenience feature (same
      # never-block-the-core-product posture as FR-82.2). install.sh (source
      # or --repair) backfills a real token into .env the next time it runs.
      HIKRAD_UPDATER_TOKEN: ${HIKRAD_UPDATER_TOKEN:-}
      HIKRAD_UPDATER_SOCKET: /var/run/hikrad-updater/updater.sock
    # gid 101 is freeradius/freeradius-server:3.2.3's own internal "freerad"
    # service account (stable since the image tag is pinned, not :latest) —
    # it creates the control socket 0660 owned by that uid:gid, which
    # hikrad-api's own unrelated uid (10001) can't otherwise reach. Joining
    # the group is simpler and less fragile than forcing uid alignment
    # across two independently-built images.
    group_add:
      - "101"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      # Bind-mounted read-only from the host so the license fingerprint
      # (FR-50.2, internal/platform/license) identifies this SERVER, not the
      # container — a container recreated by `docker compose up` (image
      # update, `hikrad restart`, host reboot) gets a fresh /etc/machine-id of
      # its own otherwise, which would look like a hardware change and trip
      # grace mode on every routine restart. Missing on some minimal hosts;
      # license.Current() tolerates that (falls back to the MAC-only half of
      # the fingerprint).
      - /etc/machine-id:/etc/machine-id:ro
      # Same host file FreeRADIUS $INCLUDEs (freeradius's own ./freeradius
      # bind mount below) — a single-file mount, not the whole config tree,
      # so hikrad-api can only ever touch this one generated file.
      - ./freeradius/clients-generated.conf:/etc/hikrad/clients-generated.conf
      # Shared with freeradius so hikrad-api can reach its control socket
      # (deploy/freeradius/sites-enabled/control-socket) to trigger a reload.
      - ${HIKRAD_DATA_DIR:-./data}/radius-control:/var/run/freeradius
      # Shared with the HOST's hikrad-updaterd daemon (not another container
      # — it isn't one, by design, C1): the daemon listens on
      # data/updater/updater.sock from the host side, reachable here at
      # /var/run/hikrad-updater/updater.sock. Same 0777 reasoning as
      # radius-control just above (root-owned daemon, unrelated container
      # uid, no secret in the directory itself — the shared token is the
      # real boundary; see docs/ops/known-issues.md, 2026-07-18).
      - ${HIKRAD_DATA_DIR:-./data}/updater:/var/run/hikrad-updater
    # Port 8080 stays internal to the compose network: Caddy proxies /api/*,
    # and FreeRADIUS calls POST /internal/radius/authorize directly (C4 — the
    # /internal/* routes are deliberately NOT reachable through Caddy).
    expose:
      - "8080"
    # MNDP neighbor discovery (FR-56.1): MikroTik routers announce themselves
    # by LAN broadcast to UDP 5678. Broadcasts never reach a bridge-network
    # container on their own; publishing the port makes the host's netfilter
    # DNAT the datagrams through to the in-app listener. Requires the HikRAD
    # host to sit on the same L2 segment as the routers; does not work under
    # Docker Desktop (dev) — use the panel's IP-range scan there instead.
    ports:
      - "5678:5678/udp"
    healthcheck:
      # TCP readiness probe baked into the image (deploy/docker/healthcheck.go):
      # hikrad-api opens :8080 only after config, migrations, and DB/Redis
      # pings succeed, so a successful dial means ready, not merely alive.
      test: ["CMD", "hikrad-healthcheck", "127.0.0.1:8080"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 1024M

  freeradius:
    # Image + mounts only — everything under deploy/freeradius/ is Agent 2's
    # (config content, mods-enabled, clients.conf, rlm_rest wiring).
    image: freeradius/freeradius-server:3.2.3
    restart: unless-stopped
    # Run under HikRAD's supervisor instead of the image's default `freeradius`
    # command. FreeRADIUS loads its client list only at startup, so the
    # supervisor watches clients-generated.conf (rewritten by hikrad-api on
    # every NAS change) and restarts FreeRADIUS when it changes — that is what
    # makes a panel-added NAS become a recognized RADIUS client automatically,
    # with no manual restart on each install. See freeradius/hikrad-run.sh.
    command: ["sh", "/etc/raddb/hikrad-run.sh"]
    depends_on:
      hikrad-api:
        condition: service_healthy
    volumes:
      - ./freeradius:/etc/raddb
      # Shared with hikrad-api (FR-13.2/AC-13a): the control socket
      # (sites-enabled/control-socket) lives here so hikrad-api can reach it
      # to trigger a reload after regenerating clients-generated.conf.
      - ${HIKRAD_DATA_DIR:-./data}/radius-control:/var/run/freeradius
    ports:
      - "1812:1812/udp"
      - "1813:1813/udp"
      - "3799:3799/udp"
    healthcheck:
      # radiusd runs as PID 1; a live PID 1 means the server is up. Agent 2
      # may replace this with a radclient Status-Server probe once their
      # config enables the status virtual server.
      test: ["CMD-SHELL", "kill -0 1"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M

  caddy:
    build:
      context: ..
      dockerfile: deploy/docker/caddy.Dockerfile
    restart: unless-stopped
    depends_on:
      hikrad-api:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ${HIKRAD_DATA_DIR:-./data}/caddy-selfsigned:/etc/caddy/selfsigned:ro
      - ${HIKRAD_DATA_DIR:-./data}/caddy:/data
      - ${HIKRAD_DATA_DIR:-./data}/caddy-config:/config
    healthcheck:
      # Caddy admin endpoint (localhost-only inside the container).
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:2019/config/"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 256M

  # ---------------------------------------------------------------------------
  # Phase 2 (Agent 3) — lossless accounting ingest (FR-37/38/40). FreeRADIUS
  # forwards accounting to http://hikrad-acct:8082/acct (contract C6). Memory
  # budget already reserved in the NFR-3 sizing above.
  # ---------------------------------------------------------------------------
  hikrad-acct:
    build:
      context: ..
      dockerfile: deploy/docker/acct.Dockerfile
    restart: unless-stopped
    environment:
      HIKRAD_DB_URL: ${HIKRAD_DB_URL:?generate with scripts/gen-env.sh}
      HIKRAD_REDIS_URL: ${HIKRAD_REDIS_URL:-redis://redis:6379/0}
      HIKRAD_ENV: ${HIKRAD_ENV:-prod}
      # Disk spill for the lossless queue (matches the volume mount below).
      HIKRAD_ACCT_SPILL_DIR: /spill
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Port 8082 stays internal to the compose network: only FreeRADIUS calls it,
    # by service name. Never proxied by Caddy.
    expose:
      - "8082"
    volumes:
      - ${HIKRAD_DATA_DIR:-./data}/acct-spill:/spill   # fsync'd WAL: survives restarts (NFR-2)
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8082/healthz"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 1024M

  # ---------------------------------------------------------------------------
  # Phase 3 (Agent 3) — monitoring service (FR-32/34/35/36/60). Runs the
  # ICMP/SNMP probe engine + up/down state machine, the alerts engine, the
  # self-checks and the dashboard sampler. The read/CRUD HTTP surface for all of
  # it is served by hikrad-api (the internal/monitorsvc module); this container
  # owns only the background loops, so it publishes no ports.
  # ---------------------------------------------------------------------------
  hikrad-monitor:
    build:
      context: ..
      dockerfile: deploy/docker/monitor.Dockerfile
    restart: unless-stopped
    # NET_RAW lets the container's ping issue ICMP echoes for reachability probes
    # without running as root.
    cap_add:
      - NET_RAW
    environment:
      HIKRAD_DB_URL: ${HIKRAD_DB_URL:?generate with scripts/gen-env.sh}
      HIKRAD_REDIS_URL: ${HIKRAD_REDIS_URL:-redis://redis:6379/0}
      # SNMP community decryption (optional; ICMP-only without it).
      HIKRAD_ENCRYPTION_KEY: ${HIKRAD_ENCRYPTION_KEY:?generate with scripts/gen-env.sh}
      HIKRAD_ENV: ${HIKRAD_ENV:-prod}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      # Wait for the API so the schema (monitoring migrations) is applied before
      # the probe/condition loops touch it.
      hikrad-api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M

  # ---------------------------------------------------------------------------
  # Phase 5 (Agent 1) — optional Cloudflare Zero Trust tunnel (FR-57, contract
  # C7). Behind the `tunnel` compose profile: NEVER started by a plain
  # `docker compose up` / `hikrad up`, only by `hikrad tunnel enable` (which
  # passes --profile tunnel). No other service has a `depends_on` pointing at
  # it and it publishes no host ports — LAN operation and RADIUS/CoA are
  # unaffected whether this container exists, is stopped, or the internet is
  # down (NFR-7). It only ever fronts Caddy: the token grants it a public
  # hostname that proxies to Caddy inside the compose network, never to
  # freeradius directly, so RADIUS (1812/1813) and CoA (3799) UDP are
  # structurally unreachable through it (FR-57.4) — there is no config here
  # that could route to those ports even by mistake.
  # ---------------------------------------------------------------------------
  cloudflared:
    image: cloudflare/cloudflared:2024.8.3
    restart: unless-stopped
    profiles: ["tunnel"]
    # The token is read from settings (`remote_access.token`, AES-GCM sealed
    # at rest) and written to this file by `hikrad tunnel enable` just before
    # starting the profile — never baked into the image or this compose file.
    command: ["tunnel", "--no-autoupdate", "run", "--token-file", "/run/secrets/tunnel-token"]
    volumes:
      - ${HIKRAD_DATA_DIR:-./data}/cloudflared/tunnel-token:/run/secrets/tunnel-token:ro
    depends_on:
      caddy:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M
