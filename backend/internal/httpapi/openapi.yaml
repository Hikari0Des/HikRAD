# HikRAD API — hand-maintained OpenAPI document (FR-52.3).
# INTERNAL ARTIFACT: not published to customers; kept next to the framework
# code it describes. Owners extend this file in the same PR that changes an
# endpoint. Conventions frozen by Phase-1 contract C2.
openapi: 3.0.3
info:
  title: HikRAD API
  description: >
    Versioned REST API served by hikrad-api. Public routes live under
    /api/v1 (proxied by Caddy); /internal routes are service-to-service
    only and are never proxied. All times are RFC 3339 UTC. All errors use
    the envelope in #/components/schemas/ErrorEnvelope. List endpoints use
    opaque keyset cursors (?cursor=&limit=, limit ≤ 100).
  version: 0.1.0-phase1
servers:
  - url: /
paths:
  /api/v1/auth/login:
    post:
      summary: Manager login (Phase-1 dev stub, contract C7)
      description: >
        Dev-mode only (HIKRAD_ENV=dev). Validates against the seeded
        managers table and returns JWTs signed with HIKRAD_JWT_SECRET.
        Phase 2 replaces the internals with the same shape.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username: { type: string }
                password: { type: string }
      responses:
        "200":
          description: Authenticated
          content:
            application/json:
              schema:
                type: object
                required: [access_token, refresh_token, manager]
                properties:
                  access_token: { type: string }
                  refresh_token: { type: string }
                  manager:
                    type: object
                    required: [id, username, role]
                    properties:
                      id: { type: string, format: uuid }
                      username: { type: string }
                      role: { type: string }
        "401": { $ref: "#/components/responses/Error" }
        "422": { $ref: "#/components/responses/Error" }
  /api/v1/subscribers:
    get:
      summary: List subscribers (Phase-1 placeholder; full CRUD in Phase 2)
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/cursor"
        - $ref: "#/components/parameters/limit"
      responses:
        "200":
          description: One page of subscribers
          content:
            application/json:
              schema:
                type: object
                required: [items, next_cursor]
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/Subscriber" }
                  next_cursor:
                    type: string
                    nullable: true
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }
  /api/v1/profiles:
    get:
      summary: List profiles (Phase-1 placeholder; full CRUD in Phase 2)
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/cursor"
        - $ref: "#/components/parameters/limit"
      responses:
        "200":
          description: One page of profiles
          content:
            application/json:
              schema:
                type: object
                required: [items, next_cursor]
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/Profile" }
                  next_cursor:
                    type: string
                    nullable: true
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }
  /internal/radius/authorize:
    post:
      summary: FreeRADIUS policy endpoint (contract C4; Phase-1 static stub)
      description: >
        Called by FreeRADIUS rlm_rest, never proxied by Caddy. Reply
        attributes are vendor-neutral intents (FR-17); the FreeRADIUS config
        maps them to VSAs. Phase-1 stub accepts exactly the seeded
        testuser/testpass with rate_limit 10M/10M.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, nas_ip, service]
              properties:
                username: { type: string }
                password: { type: string }
                chap_challenge: { type: string }
                chap_response: { type: string }
                nas_ip: { type: string }
                calling_station_id: { type: string }
                service: { type: string, enum: [pppoe, hotspot] }
      responses:
        "200":
          description: Policy decision (always 200; the decision is in `action`)
          content:
            application/json:
              schema:
                type: object
                required: [action, reason, attributes]
                properties:
                  action: { type: string, enum: [accept, reject] }
                  reason:
                    type: string
                    enum: [ok, bad_password, expired, disabled, session_limit, mac_mismatch, unknown_user, unknown_nas]
                  attributes:
                    type: array
                    items:
                      type: object
                      required: [intent, value]
                      properties:
                        intent: { type: string, enum: [rate_limit, address_pool, session_timeout] }
                        value: { type: string }
        "400": { $ref: "#/components/responses/Error" }
        "422": { $ref: "#/components/responses/Error" }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    cursor:
      name: cursor
      in: query
      description: Opaque keyset cursor from the previous page's next_cursor.
      schema: { type: string }
    limit:
      name: limit
      in: query
      description: Page size, 1–100 (default 25).
      schema: { type: integer, minimum: 1, maximum: 100, default: 25 }
  responses:
    Error:
      description: C2 error envelope
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
  schemas:
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, field_errors]
          properties:
            code: { type: string }
            message: { type: string }
            field_errors:
              type: array
              items:
                type: object
                required: [field, message]
                properties:
                  field: { type: string }
                  message: { type: string }
    Subscriber:
      type: object
      required: [id, username, status, created_at]
      properties:
        id: { type: string, format: uuid }
        username: { type: string }
        name: { type: string, nullable: true }
        phone: { type: string, nullable: true }
        status: { type: string }
        profile_id: { type: string, format: uuid, nullable: true }
        expires_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
    Profile:
      type: object
      required: [id, name, price, currency, duration_days, rate_down_kbps, rate_up_kbps, created_at]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        price: { type: integer, format: int64 }
        currency: { type: string }
        duration_days: { type: integer }
        rate_down_kbps: { type: integer }
        rate_up_kbps: { type: integer }
        created_at: { type: string, format: date-time }
